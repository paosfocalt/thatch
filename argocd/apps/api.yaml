apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: thatch-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/paosfocalt/thatch.git
    targetRevision: main
    path: helm/api
    helm:
      releaseName: thatch-api
  destination:
    server: https://kubernetes.default.svc
    namespace: thatch-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true


