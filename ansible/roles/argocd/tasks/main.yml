---
- name: Install Helm (if not present)
  ansible.builtin.shell: |
    if ! command -v helm &> /dev/null; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false

- name: Add ArgoCD Helm repo
  ansible.builtin.command: helm repo add argo https://argoproj.github.io/argo-helm
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: repo_result
  failed_when: repo_result.rc != 0 and 'already exists' not in repo_result.stderr
  changed_when: "'has been added' in repo_result.stdout"

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false

- name: Install ArgoCD via Helm
  ansible.builtin.command: >
    helm upgrade --install argocd argo/argo-cd
    --namespace {{ argocd_namespace }}
    --create-namespace
    --version {{ argocd_chart_version }}
    --set server.service.type=ClusterIP
    --wait
    --timeout 300s
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true

- name: Wait for ArgoCD server to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment argocd-server -n {{ argocd_namespace }} --timeout=300s
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: false

- name: Template root app-of-apps manifest
  ansible.builtin.template:
    src: root-app.yaml.j2
    dest: /tmp/root-app.yaml
    mode: "0644"

- name: Apply root app-of-apps
  ansible.builtin.command: kubectl apply -f /tmp/root-app.yaml
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
