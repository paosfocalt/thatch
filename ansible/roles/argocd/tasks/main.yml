---
- name: Create ArgoCD namespace
  ansible.builtin.command: kubectl create namespace {{ argocd_namespace }}
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0

- name: Apply ArgoCD manifests
  ansible.builtin.command: >
    kubectl apply -n {{ argocd_namespace }} -f {{ argocd_manifests_url }}
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true

- name: Wait for ArgoCD deployments to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment {{ item }} -n {{ argocd_namespace }} --timeout=300s
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  loop:
    - argocd-server
    - argocd-repo-server
    - argocd-applicationset-controller
    - argocd-redis
    - argocd-notifications-controller
    - argocd-dex-server
  changed_when: false

- name: Template root app-of-apps manifest
  ansible.builtin.template:
    src: root-app.yaml.j2
    dest: /tmp/root-app.yaml
    mode: "0644"

- name: Apply root app-of-apps
  ansible.builtin.command: kubectl apply -f /tmp/root-app.yaml
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_path }}"
  changed_when: true
